<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }

        /* ---- Animated Particle Canvas ---- */
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* ---- Animated Gradient Blobs ---- */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: blobFloat 8s ease-in-out infinite;
            z-index: 1;
        }
        .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #4361ee, #7209b7); top: -10%; left: -10%; animation-duration: 10s; }
        .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #4cc9f0, #4361ee); bottom: -10%; right: -5%; animation-duration: 7s; animation-delay: 2s; }
        .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #f72585, #7209b7); top: 50%; left: 40%; animation-duration: 12s; animation-delay: 4s; }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ---- Auth Card ---- */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: cardEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(60px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #4361ee, #7209b7);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 20px rgba(67, 97, 238, 0.4); }
            50% { box-shadow: 0 8px 30px rgba(67, 97, 238, 0.7); }
        }
        .logo-text { font-size: 1.8rem; font-weight: 900; color: white; }

        .auth-title { font-size: 1.8rem; font-weight: 800; color: white; text-align: center; margin-bottom: 0.5rem; }
        .auth-subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 2rem; }

        /* ---- Input Groups ---- */
        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            transition: color 0.3s;
        }
        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.25);
        }
        input:focus + .input-icon, .input-wrapper:focus-within .input-icon {
            color: #4cc9f0;
        }

        /* ---- Submit Button ---- */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4361ee, #7209b7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(67, 97, 238, 0.6); }
        .btn-submit:active { transform: scale(0.98); }

        /* ---- Loading State ---- */
        .btn-submit.loading { pointer-events: none; }
        .btn-submit .btn-text { transition: opacity 0.3s; }
        .btn-submit .btn-spinner { display: none; }
        .btn-submit.loading .btn-text { opacity: 0; }
        .btn-submit.loading .btn-spinner { display: inline-block; }

        /* ---- Error / Success Messages ---- */
        .alert {
            display: none;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            animation: alertSlide 0.4s ease;
        }
        @keyframes alertSlide {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .alert-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
        }
        .auth-footer a {
            color: #4cc9f0;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .auth-footer a:hover { color: #93c5fd; }
        .auth-footer span { color: rgba(255,255,255,0.4); font-size: 0.9rem; }

        /* ---- Floating Labels ---- */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.4rem;
        }

        /* ---- Divider ---- */
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
                <div class="logo-text">TaskPulse</div>
            </div>

            <h1 class="auth-title">Welcome back! 👋</h1>
            <p class="auth-subtitle">Sign in to continue your study journey</p>

            <div class="alert alert-error" id="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="student@taskpulse.com">
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="login-btn">
                    <span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> Sign In</span>
                    <span class="btn-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Signing in...</span>
                </button>
            </form>

            <div class="divider"></div>
            <div class="auth-footer">
                <span>New to TaskPulse? </span>
                <a href="/register">Create a free account →</a>
            </div>
        </div>
    </div>

    <script>
        // Grab invite token from URL if present
        const urlParams = new URLSearchParams(window.location.search);
        const inviteToken = urlParams.get('invite') || '';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            btn.classList.add('loading');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        invite_token: inviteToken
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.is_admin) {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = data.joined_plan ? '/?joined=1' : '/';
                    }
                } else {
                    errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${data.error || 'Login failed'}`;
                    errorMsg.style.display = 'block';
                    btn.classList.remove('loading');
                }
            } catch (err) {
                errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Network error occurred`;
                errorMsg.style.display = 'block';
                btn.classList.remove('loading');
            }
        });
    </script>
    <script>
    (function(){
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles;
        function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', () => { resize(); init(); });
        function init(){
            particles = Array.from({length: 70}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                r: Math.random()*2+0.5, op: Math.random()*0.5+0.1
            }));
        }
        init();
        function draw(){
            ctx.clearRect(0,0,W,H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0) p.x=W; if(p.x>W) p.x=0;
                if(p.y<0) p.y=H; if(p.y>H) p.y=0;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(76,201,240,${p.op})`; ctx.fill();
            });
            for(let i=0;i<particles.length;i++){
                for(let j=i+1;j<particles.length;j++){
                    const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                    const d=Math.sqrt(dx*dx+dy*dy);
                    if(d<120){
                        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                        ctx.strokeStyle=`rgba(67,97,238,${(1-d/120)*0.2})`; ctx.lineWidth=0.8; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>
</body>
</html>
