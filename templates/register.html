<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPulse — Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.45;
            animation: blobFloat 8s ease-in-out infinite;
            z-index: 1;
        }
        .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #7209b7, #4361ee); bottom: -15%; right: -10%; animation-duration: 9s; }
        .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #4cc9f0, #4361ee); top: -10%; left: -5%; animation-duration: 11s; animation-delay: 1s; }
        .blob-3 { width: 280px; height: 280px; background: radial-gradient(circle, #f72585, #b5179e); top: 30%; right: 15%; animation-duration: 7s; animation-delay: 3s; }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 40px) scale(1.05); }
            66% { transform: translate(20px, -20px) scale(0.95); }
        }

        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 2rem;
            animation: cardEntry 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(60px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #f72585, #7209b7);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            box-shadow: 0 8px 20px rgba(247, 37, 133, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 20px rgba(247, 37, 133, 0.4); }
            50% { box-shadow: 0 8px 30px rgba(247, 37, 133, 0.7); }
        }
        .logo-text { font-size: 1.8rem; font-weight: 900; color: white; }
        .auth-title { font-size: 1.8rem; font-weight: 800; color: white; text-align: center; margin-bottom: 0.5rem; }
        .auth-subtitle { font-size: 0.95rem; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 2rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 0.4rem; }
        .form-group { margin-bottom: 1.25rem; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); font-size: 1rem; transition: color 0.3s; pointer-events: none; }
        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus { background: rgba(255,255,255,0.12); border-color: #f72585; box-shadow: 0 0 0 3px rgba(247, 37, 133, 0.2); }
        .input-wrapper:focus-within .input-icon { color: #f72585; }

        /* Password Strength */
        .password-strength { margin-top: 6px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .password-strength-bar { height: 100%; width: 0; border-radius: 4px; transition: width 0.4s, background 0.4s; }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #f72585, #7209b7);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(247, 37, 133, 0.4);
        }
        .btn-submit::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(247, 37, 133, 0.6); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit.loading { pointer-events: none; }
        .btn-submit .btn-text { transition: opacity 0.3s; }
        .btn-submit .btn-spinner { display: none; }
        .btn-submit.loading .btn-text { opacity: 0; }
        .btn-submit.loading .btn-spinner { display: inline-block; }
        .alert { display: none; padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem; animation: alertSlide 0.4s ease; }
        @keyframes alertSlide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 1.5rem 0; }
        .auth-footer { text-align: center; margin-top: 1rem; }
        .auth-footer a { color: #f72585; text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .auth-footer a:hover { color: #fca5a5; }
        .auth-footer span { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fa-solid fa-user-astronaut"></i></div>
                <div class="logo-text">TaskPulse</div>
            </div>
            <h1 class="auth-title">Start for Free 🚀</h1>
            <p class="auth-subtitle">Create your account and master your studies</p>

            <div class="alert alert-error" id="error-msg"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="name" required placeholder="John Doe">
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" required placeholder="john@example.com">
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="Min. 6 characters" minlength="6">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strength-bar"></div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="reg-btn">
                    <span class="btn-text"><i class="fa-solid fa-user-plus"></i> Create Account</span>
                    <span class="btn-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Creating...</span>
                </button>
            </form>

            <div class="divider"></div>
            <div class="auth-footer">
                <span>Already have an account? </span>
                <a href="/login">Sign in here →</a>
            </div>
        </div>
    </div>

    <script>
        // Password Strength Indicator
        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^a-zA-Z0-9]/.test(val)) strength++;
            const pct = (strength / 5) * 100;
            bar.style.width = pct + '%';
            bar.style.background = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#10b981';
        });

        // Grab invite token from URL if present (?invite=xxx)
        const urlParams = new URLSearchParams(window.location.search);
        const inviteToken = urlParams.get('invite') || '';

        // Show invite banner if token present
        if (inviteToken) {
            const banner = document.createElement('div');
            banner.style.cssText = 'background:rgba(76,201,240,0.15);border:1px solid rgba(76,201,240,0.4);border-radius:10px;padding:0.8rem 1rem;margin-bottom:1rem;font-size:0.9rem;color:#4cc9f0;';
            banner.innerHTML = '<i class="fa-solid fa-user-plus"></i> You\'ve been invited to collaborate on a study plan! Create your account to join.';
            document.getElementById('error-msg').after(banner);
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            const errorMsg = document.getElementById('error-msg');
            btn.classList.add('loading');
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        invite_token: inviteToken
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.joined_plan ? '/?joined=1' : '/';
                } else {
                    errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${data.error || 'Registration failed'}`;
                    errorMsg.style.display = 'block';
                    btn.classList.remove('loading');
                }
            } catch (err) {
                errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Network error occurred`;
                errorMsg.style.display = 'block';
                btn.classList.remove('loading');
            }
        });
    </script>
    <script>
    (function(){
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles;
        function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', () => { resize(); init(); });
        function init(){
            particles = Array.from({length: 70}, () => ({
                x: Math.random()*W, y: Math.random()*H,
                vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                r: Math.random()*2+0.5, op: Math.random()*0.5+0.1
            }));
        }
        init();
        function draw(){
            ctx.clearRect(0,0,W,H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0) p.x=W; if(p.x>W) p.x=0;
                if(p.y<0) p.y=H; if(p.y>H) p.y=0;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(247,37,133,${p.op})`; ctx.fill();
            });
            for(let i=0;i<particles.length;i++){
                for(let j=i+1;j<particles.length;j++){
                    const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                    const d=Math.sqrt(dx*dx+dy*dy);
                    if(d<120){
                        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                        ctx.strokeStyle=`rgba(114,9,183,${(1-d/120)*0.2})`; ctx.lineWidth=0.8; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>
</body>
</html>
