<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TaskPulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .admin-table-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table th {
            background-color: rgba(0,0,0,0.02);
            font-weight: 600;
        }
    </style>
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-bolt"></i>
                <span>TaskPulse <span style="color:red; font-size:12px;">ADMIN</span></span>
            </div>
            
            <ul class="nav-links">
                <li class="active">
                    <i class="fa-solid fa-users-gear"></i>
                    <span>System Overview</span>
                </li>
                <li id="nav-back-home" style="cursor: pointer;">
                    <i class="fa-solid fa-house"></i>
                    <span>Back to App</span>
                </li>
            </ul>

            <div class="sidebar-footer">
                <div class="logout-btn" id="logout-btn" style="cursor: pointer; color: var(--danger); font-weight: 500; display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Log Out</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="welcome-msg">Administrator Dashboard</div>
                <div class="date-display" id="date-display"></div>
            </header>

            <section class="view-section active">
                <div class="section-header">
                    <h2 class="section-title">Global Statistics</h2>
                </div>
                <div class="admin-stat-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(114,9,183,0.1); color: #7209b7;"><i class="fa-solid fa-users"></i></div>
                        <div class="stat-details">
                            <h3>Total Users</h3>
                            <p id="stat-users">-</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(67,97,238,0.1); color: #4361ee;"><i class="fa-solid fa-folder"></i></div>
                        <div class="stat-details">
                            <h3>Total Study Plans</h3>
                            <p id="stat-plans">-</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(46,196,182,0.1); color: #2ec4b6;"><i class="fa-solid fa-list-check"></i></div>
                        <div class="stat-details">
                            <h3>Total Tasks Created</h3>
                            <p id="stat-tasks">-</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: rgba(255,183,3,0.1); color: #ffb703;"><i class="fa-solid fa-stopwatch"></i></div>
                        <div class="stat-details">
                            <h3>Total Time Logged</h3>
                            <p id="stat-time">-</p>
                        </div>
                    </div>
                </div>

                <div class="section-header" style="margin-top: 2rem;">
                    <h2 class="section-title">User Management</h2>
                </div>
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Study Plans</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Users dynamically injected -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date-display').innerText = new Date().toLocaleDateString(undefined, dateOptions);

            document.getElementById('nav-back-home').addEventListener('click', () => {
                window.location.href = '/';
            });
            
            document.getElementById('logout-btn').addEventListener('click', async () => {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            });

            await fetchStats();
        });

        async function fetchStats() {
            try {
                const res = await fetch('/api/admin/stats');
                if (!res.ok) {
                    showToast("Failed to load or unauthorized.", "error");
                    return;
                }
                const data = await res.json();
                
                document.getElementById('stat-users').innerText = data.totalUsers;
                document.getElementById('stat-plans').innerText = data.totalPlans;
                document.getElementById('stat-tasks').innerText = data.totalTasks;
                document.getElementById('stat-time').innerText = data.totalTimeSpent + ' min';

                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                data.users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.userID}</td>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td><span class="badge ${u.is_admin ? 'critical' : 'attention'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
                        <td>${u.totalPlans}</td>
                        <td>
                            ${!u.is_admin ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.userID})">Delete</button>` : '<em>Protected</em>'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteUser(id) {
            if(!confirm("Are you sure you want to permanently delete this user and all their data?")) return;
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                if(res.ok) {
                    showToast("User deleted successfully.", "success");
                    fetchStats();
                } else {
                    const d = await res.json();
                    showToast(d.error || "Failed to delete user.", "error");
                }
            } catch (e) {
                console.error(e);
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fa-solid fa-info-circle"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }
    </script>
</body>
</html>
